# Hand-curated dictionary of NYC agencies for the agency resolver.
# Source: NYC government internal agency table (2026-05-23).
# Slug convention: lowercase abbreviation when well-known and non-ambiguous,
# else kebab-case. Aliases must be phrases that plausibly appear in bill
# text — internal acronyms that aren't cited in legislation (e.g., bare
# 3-char codes) are intentionally omitted to avoid FTS false positives.

acs:
  display: "Administration for Children's Services"
  aliases: ["ACS", "Administration for Children's Services"]

bic:
  display: "Business Integrity Commission"
  aliases: ["BIC", "Business Integrity Commission"]

