dcwp:
  # Renamed from "Department of Consumer Affairs" (DCA) in 2020. Bills before
  # 2020 cite DCA; after, DCWP. Merged into one entry so a query for either
  # name returns the agency's full history.
  display: "Department of Consumer and Worker Protection"
  aliases:
    - "DCWP"
    - "Department of Consumer and Worker Protection"
    - "DCA"
